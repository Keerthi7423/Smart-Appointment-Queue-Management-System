worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  # Docker DNS resolver for service-name discovery on the internal network.
  resolver 127.0.0.11 ipv6=off valid=30s;

  # Ready for horizontal scaling: add more backend servers here.
  upstream backend_upstream {
    least_conn;
    server backend:5000;
    # server backend_2:5000;
    # server backend_3:5000;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    location / {
      add_header Content-Type text/plain;
      return 200 "Frontend service is not configured yet.\n";
    }
  }
}
