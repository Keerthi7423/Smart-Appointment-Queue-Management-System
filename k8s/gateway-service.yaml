apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: smart-queue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: smart-queue/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: APPOINTMENT_SERVICE_URL
              value: "http://appointment-service:5002"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:5003"
          envFrom:
            - configMapRef:
                name: backend-config
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: smart-queue
spec:
  type: ClusterIP
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 5000
      targetPort: 5000
