apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: smart-queue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: smart-queue/appointment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: PORT
              value: "5002"
            - name: SERVICE_NAME
              value: "appointment-service"
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: smart-queue
spec:
  type: ClusterIP
  selector:
    app: appointment-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002

