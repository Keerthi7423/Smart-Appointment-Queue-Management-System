apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: smart-queue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: smart-queue/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: SERVICE_NAME
              value: "payment-service"
          envFrom:
            - configMapRef:
                name: backend-config
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "150m"
              memory: "192Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: smart-queue
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003

