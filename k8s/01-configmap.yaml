apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: smart-queue
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:30080"
  REDIS_URL: "redis://redis:6379"
  EVENT_BUS_CHANNEL: "smart-queue-events"
  AUTH_MONGO_URI_PROD: "mongodb://mongo:27017/smartQueueDB"
  APPOINTMENT_MONGO_URI_PROD: "mongodb://mongo:27017/smartQueueDB"
  PAYMENT_MONGO_URI_PROD: "mongodb://mongo:27017/smartQueueDB"

