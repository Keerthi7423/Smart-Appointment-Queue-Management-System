services:
  nginx:
    container_name: smart-queue-nginx
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
    restart: always

  backend:
    container_name: smart-queue-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      MONGO_URI_DEV: ${MONGO_URI_DEV:-mongodb://mongo:27017/smartQueueDB}
      MONGO_URI_PROD: ${MONGO_URI_PROD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  mongo:
    container_name: smart-queue-mongo
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartQueueDB
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  redis:
    container_name: smart-queue-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: always

volumes:
  mongo_data:
  redis_data:
