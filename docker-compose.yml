services:
  nginx:
    container_name: smart-queue-nginx
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      appointment-service:
        condition: service_started
      payment-service:
        condition: service_started
    networks:
      - smart-queue-network
    restart: always

  auth-service:
    container_name: smart-queue-auth-service
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      AUTH_MONGO_URI_DEV: ${AUTH_MONGO_URI_DEV:-mongodb://mongo:27017/smartQueueDB}
      AUTH_MONGO_URI_PROD: ${AUTH_MONGO_URI_PROD:-}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - smart-queue-network
    restart: always

  appointment-service:
    container_name: smart-queue-appointment-service
    build:
      context: ./backend/appointment-service
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5002
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      APPOINTMENT_MONGO_URI_DEV: ${APPOINTMENT_MONGO_URI_DEV:-mongodb://mongo:27017/smartQueueDB}
      APPOINTMENT_MONGO_URI_PROD: ${APPOINTMENT_MONGO_URI_PROD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EVENT_BUS_CHANNEL: ${EVENT_BUS_CHANNEL:-smart-queue-events}
      SERVICE_NAME: appointment-service
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smart-queue-network
    restart: always

  payment-service:
    container_name: smart-queue-payment-service
    build:
      context: ./backend/payment-service
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5003
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      PAYMENT_MONGO_URI_DEV: ${PAYMENT_MONGO_URI_DEV:-mongodb://mongo:27017/smartQueueDB}
      PAYMENT_MONGO_URI_PROD: ${PAYMENT_MONGO_URI_PROD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EVENT_BUS_CHANNEL: ${EVENT_BUS_CHANNEL:-smart-queue-events}
      SERVICE_NAME: payment-service
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smart-queue-network
    restart: always

  mongo:
    container_name: smart-queue-mongo
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: smartQueueDB
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smart-queue-network
    restart: always

  redis:
    container_name: smart-queue-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - smart-queue-network
    restart: always

volumes:
  mongo_data:
  redis_data:

networks:
  smart-queue-network:
    driver: bridge
